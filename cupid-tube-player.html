<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<!-- Required so YouTube's embedded player receives a valid Referer header (avoids Error 153) -->
<meta name="referrer" content="strict-origin-when-cross-origin" />
<title>ZombieSparkles Tube</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');

  :root{
    --panel:#ffb3d1; --panelDark:#ff98c1;
    --accent:#ff2e86; --accentSoft:#ff6fae; --ink:#3a1020; --cream:#fff5fa;
    --vinylA:#2a0d1a; --vinylB:#3d1327; --label:#ff4f9a;
  }
  [data-theme="blue"]{
    --panel:#a9cdff; --panelDark:#89b7ff;
    --accent:#2e6bff; --accentSoft:#6fa1ff; --ink:#0f2340; --cream:#f2f8ff;
    --vinylA:#0d1a2a; --vinylB:#132741; --label:#3a7bff;
  }

  *{ box-sizing:border-box; }
  html,body{ margin:0; min-height:100%; }
  body{
    font-family:'VT323',monospace;
    display:flex; align-items:center; justify-content:center;
    padding:24px 12px; min-height:100vh; position:relative;
  }

  /* ---------- fantasy scene background ---------- */
  .scene{ position:fixed; inset:0; width:100%; height:100%; z-index:-1; pointer-events:none; }
  .scene svg{ width:100%; height:100%; display:block; }

  /* ---------- device shell ---------- */
  .device{
    width:100%; max-width:760px; background:var(--panel);
    border:3px solid var(--ink); box-shadow:6px 6px 0 0 rgba(0,0,0,.35), 0 0 0 3px var(--ink);
    padding:16px;
  }

  .titlebar{ display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:14px; }
  .logo{ font-family:'Press Start 2P',monospace; font-size:clamp(9px,2.4vw,13px); color:var(--ink);
    display:flex; align-items:center; gap:8px; white-space:nowrap; overflow:hidden; }

  .btn{
    font-family:'Press Start 2P',monospace; background:var(--cream); color:var(--ink);
    border:3px solid var(--ink); box-shadow:3px 3px 0 0 var(--ink); cursor:pointer;
    transition:transform .04s, box-shadow .04s; user-select:none;
  }
  .btn:active{ transform:translate(3px,3px); box-shadow:0 0 0 0 var(--ink); }
  .btn:focus-visible{ outline:3px dashed var(--ink); outline-offset:3px; }
  .btn.accent{ background:var(--accent); color:var(--cream); }
  .btn.label{ background:var(--label); color:var(--cream); }
  .btn.on{ background:var(--accent); color:var(--cream); }

  .loadrow{ display:flex; gap:8px; margin-bottom:12px; }
  .urlinput{ flex:1; min-width:0; font-family:'VT323',monospace; font-size:20px; color:var(--ink);
    background:var(--cream); border:3px solid var(--ink); box-shadow:3px 3px 0 0 var(--ink); padding:6px 10px; }
  .urlinput:focus{ outline:none; }

  /* two-column body: player + up-next */
  .layout{ display:grid; grid-template-columns:1fr; gap:14px; }
  @media(min-width:680px){ .layout{ grid-template-columns:minmax(0,1fr) 230px; align-items:start; } }

  .screen{ position:relative; background:#000; border:3px solid var(--ink);
    box-shadow:inset 0 0 0 3px var(--panelDark); aspect-ratio:16/9; overflow:hidden; }
  .screen #ytplayer{ width:100%; height:100%; border:0; display:block; }
  .placeholder{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    text-align:center; color:var(--panelDark); font-size:20px; padding:16px; }

  /* ---------- turntable (centered below video) ---------- */
  .turntable{ position:relative; width:210px; height:196px; margin:14px auto 12px;
    background:var(--panelDark); border:3px solid var(--ink); box-shadow:4px 4px 0 0 var(--ink); }
  .vinyl{ position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
    width:160px; height:160px; border-radius:50%; border:3px solid var(--ink);
    background:repeating-radial-gradient(circle at 50% 50%,var(--vinylA) 0 3px,var(--vinylB) 3px 7px);
    box-shadow:0 0 0 6px var(--label), 0 0 0 9px var(--ink); }
  .vinyl.spin{ animation:spin 3.4s linear infinite; }
  .vinyl .lbl{ position:absolute; inset:33%; border-radius:50%; background:var(--label); border:3px solid var(--ink);
    display:flex; align-items:center; justify-content:center; color:var(--cream);
    font-family:'Press Start 2P',monospace; font-size:11px; }
  .vinyl .hole{ position:absolute; inset:47%; border-radius:50%; background:var(--cream); border:2px solid var(--ink); }
  @keyframes spin{ to{ transform:translate(-50%,-50%) rotate(360deg); } }

  .tonebase{ position:absolute; top:8px; right:10px; width:22px; height:22px; border-radius:50%;
    background:var(--cream); border:3px solid var(--ink); z-index:3; }
  .tonearm{ position:absolute; top:17px; right:19px; width:9px; height:104px; background:var(--cream);
    border:3px solid var(--ink); transform-origin:50% 6px; transform:rotate(6deg);
    transition:transform .5s cubic-bezier(.2,1.4,.4,1); z-index:2; }
  .turntable.playing .tonearm{ transform:rotate(26deg); }
  .tonearm .head{ position:absolute; bottom:-8px; left:-5px; width:17px; height:12px;
    background:var(--accent); border:3px solid var(--ink); }

  /* title marquee */
  .titlebox{ overflow:hidden; white-space:nowrap; background:var(--cream); border:3px solid var(--ink);
    box-shadow:3px 3px 0 0 var(--ink); padding:6px 10px; margin-bottom:12px; height:34px; display:flex; align-items:center; }
  .titlebox span{ display:inline-block; color:var(--ink); font-size:22px; line-height:1; }
  .titlebox span.marq{ animation:marquee 9s linear infinite; }
  @keyframes marquee{ 0%{transform:translateX(0);} 100%{transform:translateX(calc(-100% - 40px));} }

  /* seek */
  .seek{ position:relative; height:16px; background:var(--cream); border:3px solid var(--ink);
    box-shadow:3px 3px 0 0 var(--ink); cursor:pointer; touch-action:none; }
  .seek .fill{ position:absolute; left:0; top:0; bottom:0; width:0%; background:var(--accent); }
  .seek .star{ position:absolute; top:50%; left:0%; transform:translate(-50%,-50%);
    filter:drop-shadow(2px 2px 0 var(--ink)); pointer-events:none; }
  .times{ display:flex; justify-content:space-between; color:var(--ink); font-size:18px; margin:6px 0 12px; }

  .transport{ display:flex; align-items:center; justify-content:center; gap:8px; margin-bottom:14px; }
  .transport .btn{ font-size:12px; padding:10px 10px; }
  .transport .play{ font-size:14px; padding:12px 16px; }

  .volrow{ display:flex; align-items:center; gap:10px; margin-bottom:6px; }
  .volrow span{ color:var(--ink); font-size:18px; width:28px; }
  input[type=range].vol{ -webkit-appearance:none; appearance:none; flex:1; height:10px;
    border:3px solid var(--ink); background:#fff; box-shadow:3px 3px 0 0 var(--ink); cursor:pointer; }
  input[type=range].vol::-webkit-slider-thumb{ -webkit-appearance:none; width:16px; height:20px; background:var(--ink); border:0; }
  input[type=range].vol::-moz-range-thumb{ width:16px; height:20px; background:var(--ink); border:0; }

  .status{ color:var(--ink); font-size:16px; opacity:.75; text-align:center; min-height:20px; margin-top:8px; }
  .status.err{ color:var(--accent); opacity:1; }

  /* ---------- up next sidebar ---------- */
  .sidebar{ background:var(--cream); border:3px solid var(--ink); box-shadow:4px 4px 0 0 var(--ink);
    display:flex; flex-direction:column; max-height:520px; }
  .sidebar h2{ font-family:'Press Start 2P',monospace; font-size:10px; color:var(--cream); background:var(--accent);
    margin:0; padding:10px; border-bottom:3px solid var(--ink); }
  .queue{ overflow-y:auto; }
  .qrow{ display:flex; align-items:center; gap:8px; width:100%; text-align:left; border:none; background:transparent;
    color:var(--ink); border-bottom:2px solid rgba(0,0,0,.12); padding:8px 10px;
    font-family:'VT323',monospace; font-size:19px; cursor:pointer; }
  .qrow:hover{ background:var(--panelDark); }
  .qrow.current{ background:var(--accentSoft); color:var(--cream); }
  .qrow.played{ opacity:.55; }
  .qrow .num{ width:22px; flex-shrink:0; text-align:center; }
  .qrow .name{ white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .queue-empty{ padding:12px; color:var(--ink); opacity:.7; font-size:18px; }

  @media (prefers-reduced-motion: reduce){
    .vinyl.spin,.titlebox span.marq,.floaty,.wing,.cloud{ animation:none !important; }
  }
</style>
</head>
<body>
  <!-- ===================== BACKGROUND SCENE ===================== -->
  <div class="scene" aria-hidden="true">
    <svg viewBox="0 0 320 180" preserveAspectRatio="xMidYMid slice" shape-rendering="crispEdges">
      <defs>
        <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"  stop-color="#6cc0ff"/>
          <stop offset="45%" stop-color="#a9dcff"/>
          <stop offset="74%" stop-color="#ffe9c9"/>
          <stop offset="100%" stop-color="#ffd6ec"/>
        </linearGradient>
        <symbol id="cloud" viewBox="0 0 44 18">
          <rect x="6" y="9" width="32" height="6" fill="#ffffff"/>
          <rect x="2" y="11" width="40" height="5" fill="#ffffff"/>
          <rect x="12" y="5" width="10" height="6" fill="#ffffff"/>
          <rect x="20" y="7" width="12" height="5" fill="#ffffff"/>
          <rect x="7" y="7" width="9" height="5" fill="#ffffff"/>
          <rect x="2" y="15" width="40" height="2" fill="#e3d0f2"/>
        </symbol>
        <symbol id="pine" viewBox="0 0 12 18">
          <rect x="5" y="13" width="2" height="5" fill="#6b4a2e"/>

        </symbol>
      </defs>

      <!-- sky + sun -->
      <rect x="0" y="0" width="320" height="180" fill="url(#sky)"/>
      <circle cx="264" cy="32" r="22" fill="#fff2b0" opacity="0.35"/>
      <circle cx="264" cy="32" r="14" fill="#fff2b0"/>

      <!-- drifting clouds -->
      <use href="#cloud" x="18"  y="22" width="46" height="19" class="cloud c1"/>
      <use href="#cloud" x="172" y="12" width="70" height="29" class="cloud c2"/>
      <use href="#cloud" x="104" y="42" width="54" height="22" class="cloud c3"/>
      <use href="#cloud" x="246" y="58" width="40" height="16" class="cloud c4"/>

      <!-- mountains -->
      <polygon points="0,122 42,84 72,104 112,76 152,108 192,82 232,110 282,86 320,116 320,180 0,180" fill="#cbe1f5"/>
      <polygon points="106,80 112,76 120,86" fill="#ffffff"/>
      <polygon points="186,86 192,82 200,90" fill="#ffffff"/>
      <polygon points="276,90 282,86 290,94" fill="#ffffff"/>

      <!-- back hill -->
      <polygon points="0,132 60,124 140,134 210,120 320,130 320,180 0,180" fill="#74c684"/>

      <!-- castle on the hill -->
      <g transform="translate(146,92)">
        <rect x="8"  y="16" width="9"  height="26" fill="#fbf3ff"/>
        <rect x="14" y="20" width="24" height="22" fill="#fbf3ff"/>
        <rect x="37" y="14" width="10" height="28" fill="#fbf3ff"/>
        <polygon points="5,17 12,7 19,17"  fill="#ff9ec7"/>
        <polygon points="11,21 26,10 41,21" fill="#ff9ec7"/>
        <polygon points="36,15 42,4 49,15"  fill="#ff9ec7"/>
        <rect x="11" y="25" width="3" height="4" fill="#6b567e"/>
        <rect x="40" y="23" width="3" height="4" fill="#6b567e"/>
        <rect x="23" y="27" width="5" height="5" fill="#6b567e"/>
        <rect x="23" y="35" width="6" height="7" fill="#7a5a4a"/>
      </g>

      <!-- front hill -->
      <polygon points="0,150 80,142 170,152 260,140 320,148 320,180 0,180" fill="#57a869"/>

      <!-- pines -->
      <use href="#pine" x="8"   y="118" width="14" height="21"/>
      <use href="#pine" x="24"  y="122" width="12" height="18"/>
      <use href="#pine" x="40"  y="120" width="13" height="20"/>
      <use href="#pine" x="250" y="120" width="13" height="20"/>
      <use href="#pine" x="266" y="123" width="11" height="17"/>
      <use href="#pine" x="288" y="119" width="14" height="21"/>
      <use href="#pine" x="60"  y="150" width="16" height="24"/>
      <use href="#pine" x="236" y="150" width="16" height="24"/>

      <!-- dragon 1 (teal) -->
      <g transform="translate(50,34) scale(1.25)">
        <g class="floaty">
          <polygon points="2,11 8,10 12,12 8,13" fill="#3fa99b"/>
          <polygon points="10,8 18,7 22,10 18,13 11,12" fill="#5fc9bb"/>
          <polygon points="19,8 25,5 28,6 28,8 24,10 20,10" fill="#5fc9bb"/>
          <rect x="13" y="12" width="2" height="3" fill="#3fa99b"/>
          <rect x="17" y="12" width="2" height="3" fill="#3fa99b"/>
          <circle cx="26" cy="7" r="0.9" fill="#20303a"/>

        </g>
      </g>

      <!-- dragon 2 (lavender) -->
      <g transform="translate(214,26) scale(1.0)">
        <g class="floaty slow">
          <polygon points="2,11 8,10 12,12 8,13" fill="#8f73cf"/>
          <polygon points="10,8 18,7 22,10 18,13 11,12" fill="#ad93e3"/>
          <polygon points="19,8 25,5 28,6 28,8 24,10 20,10" fill="#ad93e3"/>
          <rect x="13" y="12" width="2" height="3" fill="#8f73cf"/>
          <rect x="17" y="12" width="2" height="3" fill="#8f73cf"/>
          <circle cx="26" cy="7" r="0.9" fill="#2a2340"/>
          <g class="wing"><polygon points="12,8 6,1 18,5 15,9" fill="#8f73cf"/></g>
        </g>
      </g>
    </svg>
  </div>

  <style>
    /* scene animations (kept here so the SVG classes above resolve) */
    .cloud{ transform-box:view-box; }
    .c1{ animation:driftA 26s ease-in-out infinite; }
    .c2{ animation:driftB 34s ease-in-out infinite; }
    .c3{ animation:driftA 30s ease-in-out infinite; }
    .c4{ animation:driftB 22s ease-in-out infinite; }
    @keyframes driftA{ 0%,100%{transform:translateX(-6px);} 50%{transform:translateX(10px);} }
    @keyframes driftB{ 0%,100%{transform:translateX(8px);} 50%{transform:translateX(-8px);} }
    .floaty{ animation:bob 3.4s ease-in-out infinite; }
    .floaty.slow{ animation-duration:4.3s; animation-delay:.6s; }
    @keyframes bob{ 0%,100%{transform:translateY(0);} 50%{transform:translateY(-5px);} }
    .wing{ transform-box:fill-box; transform-origin:72% 90%; animation:flap .85s ease-in-out infinite; }
    @keyframes flap{ 0%,100%{transform:rotate(3deg);} 50%{transform:rotate(-22deg);} }
  </style>

  <!-- ===================== PLAYER ===================== -->
  <div class="device" id="device" data-theme="pink">
    <div class="titlebar">
      <div class="logo">♥ ZombieSparkles Tube ♥</div>
      <button class="btn accent" id="themeBtn" style="font-size:8px;padding:7px 8px;" aria-label="Switch theme">PINK</button>
    </div>

    <div class="loadrow">
      <input class="urlinput" id="urlInput" type="text" placeholder="paste a youtube link…" aria-label="YouTube link" />
      <button class="btn label" id="loadBtn" style="font-size:10px;padding:0 12px;">LOAD</button>
    </div>

    <div class="layout">
      <!-- main player column -->
      <div class="main">
        <div class="screen">
          <div id="ytplayer"></div>
          <div class="placeholder" id="placeholder">paste a youtube video or playlist link above, then hit LOAD ♥</div>
        </div>

        <div class="turntable" id="turntable">
          <div class="vinyl" id="vinyl"><div class="lbl">♥</div><div class="hole"></div></div>
          <div class="tonebase"></div>
          <div class="tonearm"><div class="head"></div></div>
        </div>

        <div class="titlebox"><span id="title">— nothing playing —</span></div>

        <div class="seek" id="seek" role="slider" tabindex="0" aria-label="Seek" aria-valuemin="0" aria-valuemax="0" aria-valuenow="0">
          <div class="fill" id="fill"></div>
          <div class="star" id="star" aria-hidden="true">
            <svg width="24" height="24" viewBox="0 0 24 24" shape-rendering="crispEdges">
              <path d="M12 2 L15 9 L22 9 L16.5 13.5 L18.5 21 L12 16.5 L5.5 21 L7.5 13.5 L2 9 L9 9 Z"
                fill="var(--cream)" stroke="var(--ink)" stroke-width="1.5" stroke-linejoin="round"/>
            </svg>
          </div>
        </div>
        <div class="times"><span id="cur">0:00</span><span id="dur">0:00</span></div>

        <div class="transport">
          <button class="btn" id="shuffleBtn" aria-label="Shuffle" title="Shuffle">⇄</button>
          <button class="btn" id="prevBtn" aria-label="Previous">◄◄</button>
          <button class="btn accent play" id="playBtn" aria-label="Play">►</button>
          <button class="btn" id="nextBtn" aria-label="Next">►►</button>
          <button class="btn" id="repeatBtn" aria-label="Repeat" title="Repeat">⟳</button>
        </div>

        <div class="volrow">
          <span>VOL</span>
          <input class="vol" id="vol" type="range" min="0" max="100" step="1" value="80" aria-label="Volume" />
        </div>

        <div class="status" id="status">plays via youtube · video or playlist links both work</div>
      </div>

      <!-- up next sidebar -->
      <aside class="sidebar">
        <h2>UP NEXT</h2>
        <div class="queue" id="queue">
          <div class="queue-empty">load a playlist to see what's coming up ♥</div>
        </div>
      </aside>
    </div>
  </div>

<script>
  // ---------- pixel UI wiring ----------
  const $ = (id) => document.getElementById(id);
  const device = $('device');
  let theme = 'pink';
  $('themeBtn').addEventListener('click', () => {
    theme = theme === 'pink' ? 'blue' : 'pink';
    device.setAttribute('data-theme', theme);
    $('themeBtn').textContent = theme.toUpperCase();
  });

  // ---------- YouTube IFrame API ----------
  let player = null;
  let apiReady = false;
  let pendingInput = null;
  let dragging = false;
  let lastTitle = '';
  let shuffleOn = false;
  let repeatMode = 0;            // 0 = off, 1 = all, 2 = one
  const REPEAT_LABEL = ['⟳', '⟳', '⟳¹'];
  const titleCache = {};         // video_id -> title (filled as tracks play)

  (function(){
    const tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(tag);
  })();

  window.onYouTubeIframeAPIReady = function(){
    const onWeb = location.protocol === 'http:' || location.protocol === 'https:';
    const vars = { controls: 0, modestbranding: 1, rel: 0, playsinline: 1, iv_load_policy: 3 };
    if (onWeb) vars.origin = location.origin;

    player = new YT.Player('ytplayer', {
      width: '100%', height: '100%',
      host: 'https://www.youtube-nocookie.com',
      playerVars: vars,
      events: {
        onReady: () => {
          apiReady = true;
          player.setVolume(parseInt($('vol').value, 10));
          if (pendingInput) { loadInput(pendingInput); pendingInput = null; }
        },
        onStateChange: onState,
        onError: onError
      }
    });
  };

  function parseYouTube(input){
    input = (input || '').trim();
    let video = null, list = null;
    try {
      const u = new URL(input);
      if (u.hostname.includes('youtu.be')) video = u.pathname.slice(1) || null;
      const v = u.searchParams.get('v'); if (v) video = v;
      list = u.searchParams.get('list');
      const m = u.pathname.match(/\/(embed|shorts|v)\/([^/?#]+)/);
      if (m) video = m[2];
    } catch(e){
      if (/^(PL|UU|OL|RD|LL|FL)/.test(input)) list = input;
      else if (input) video = input;
    }
    return { video, list };
  }

  function loadInput(input){
    const p = parseYouTube(input);
    if (!p.video && !p.list){ setStatus('couldn’t read that link — paste a youtube video or playlist url', true); return; }
    $('placeholder').style.display = 'none';
    setStatus('loading…');
    if (p.list){
      player.loadPlaylist({ list: p.list, listType: 'playlist', index: 0, startSeconds: 0 });
    } else {
      player.loadVideoById(p.video);
    }
    // (re)apply shuffle/repeat once the list exists, then draw the queue
    setTimeout(() => { applyShuffle(); applyRepeat(); renderQueue(); }, 900);
  }

  function submit(){
    const val = $('urlInput').value;
    if (!val.trim()) return;
    if (!apiReady){ pendingInput = val; setStatus('warming up the player…'); return; }
    loadInput(val);
  }
  $('loadBtn').addEventListener('click', submit);
  $('urlInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') submit(); });

  // transport
  $('playBtn').addEventListener('click', () => {
    if (!player || !player.getPlayerState) return;
    const st = player.getPlayerState();
    if (st === 1) player.pauseVideo(); else player.playVideo();
  });
  $('nextBtn').addEventListener('click', () => player && player.nextVideo && player.nextVideo());
  $('prevBtn').addEventListener('click', () => {
    if (!player) return;
    if (player.getCurrentTime && player.getCurrentTime() > 3){ player.seekTo(0, true); return; }
    player.previousVideo && player.previousVideo();
  });
  $('vol').addEventListener('input', (e) => player && player.setVolume && player.setVolume(parseInt(e.target.value, 10)));

  // shuffle / repeat
  $('shuffleBtn').addEventListener('click', () => {
    shuffleOn = !shuffleOn;
    $('shuffleBtn').classList.toggle('on', shuffleOn);
    applyShuffle();
    setTimeout(renderQueue, 300);
  });
  function applyShuffle(){
    if (player && player.setShuffle) { try { player.setShuffle(shuffleOn); } catch(_){} }
  }
  $('repeatBtn').addEventListener('click', () => {
    repeatMode = (repeatMode + 1) % 3;
    const btn = $('repeatBtn');
    btn.textContent = REPEAT_LABEL[repeatMode];
    btn.classList.toggle('on', repeatMode !== 0);
    applyRepeat();
  });
  function applyRepeat(){
    if (player && player.setLoop) { try { player.setLoop(repeatMode === 1); } catch(_){} }
  }

  function onState(e){
    const playing = e.data === 1;
    $('vinyl').classList.toggle('spin', playing);
    $('turntable').classList.toggle('playing', playing);
    $('playBtn').textContent = playing ? '❚❚' : '►';
    if (e.data === 1 || e.data === 5) setStatus('');

    // repeat-one: when a track ends, replay it
    if (e.data === 0 && repeatMode === 2 && player){
      const idx = player.getPlaylistIndex ? player.getPlaylistIndex() : -1;
      if (idx >= 0 && player.playVideoAt) player.playVideoAt(idx);
      else { player.seekTo(0, true); player.playVideo(); }
    }

    updateTitle();
    renderQueue();
  }

  function onError(e){
    const map = {
      2:'that link looks malformed',
      5:'this video can’t play in an embedded player',
      100:'video not found — it may be private or removed',
      101:'the owner disabled embedding for this one',
      150:'the owner disabled embedding for this one',
      153:'the page didn’t send a referrer — serve this over http(s), not file://'
    };
    setStatus(map[e.data] || ('youtube error ' + e.data), true);
  }

  function setStatus(msg, isErr){
    const s = $('status');
    s.textContent = msg;
    s.classList.toggle('err', !!isErr);
  }

  function updateTitle(){
    if (!player || !player.getVideoData) return;
    const d = player.getVideoData();
    const title = (d && d.title) ? d.title : '';
    if (d && d.video_id && title) titleCache[d.video_id] = title;
    if (title && title !== lastTitle){
      lastTitle = title;
      const span = $('title');
      span.textContent = title;
      span.classList.remove('marq');
      const box = span.parentElement;
      if (span.scrollWidth > box.clientWidth + 4) span.classList.add('marq');
    }
  }

  // ---------- up next queue ----------
  function renderQueue(){
    const wrap = $('queue');
    if (!player || !player.getPlaylist){ return; }
    const ids = player.getPlaylist() || [];
    const idx = player.getPlaylistIndex ? player.getPlaylistIndex() : -1;

    if (!ids.length){
      // single video (no playlist)
      const d = player.getVideoData ? player.getVideoData() : null;
      if (d && d.title){
        wrap.innerHTML = '';
        wrap.appendChild(makeRow(0, d.title, true, false));
      }
      return;
    }

    wrap.innerHTML = '';
    ids.forEach((id, i) => {
      const name = titleCache[id] || ('Track ' + (i + 1));
      const row = makeRow(i, name, i === idx, i < idx);
      row.addEventListener('click', () => { if (player.playVideoAt) player.playVideoAt(i); });
      wrap.appendChild(row);
    });
    const cur = wrap.querySelector('.qrow.current');
    if (cur && cur.scrollIntoView) cur.scrollIntoView({ block: 'nearest' });
  }

  function makeRow(i, name, isCurrent, isPlayed){
    const row = document.createElement('button');
    row.className = 'qrow' + (isCurrent ? ' current' : '') + (isPlayed ? ' played' : '');
    const num = document.createElement('span');
    num.className = 'num';
    num.textContent = isCurrent ? '♪' : (i + 1);
    const nm = document.createElement('span');
    nm.className = 'name';
    nm.textContent = name;
    row.appendChild(num); row.appendChild(nm);
    return row;
  }

  // ---------- seek (draggable star) ----------
  const seek = $('seek');
  function seekFromClientX(clientX){
    if (!player || !player.getDuration) return;
    const dur = player.getDuration() || 0;
    if (!dur) return;
    const rect = seek.getBoundingClientRect();
    const frac = Math.min(1, Math.max(0, (clientX - rect.left) / rect.width));
    player.seekTo(frac * dur, true);
    paintSeek(frac, frac * dur, dur);
  }
  seek.addEventListener('pointerdown', (e) => {
    if (!player || !player.getDuration || !player.getDuration()) return;
    seek.setPointerCapture(e.pointerId); dragging = true; seekFromClientX(e.clientX);
  });
  seek.addEventListener('pointermove', (e) => { if (dragging) seekFromClientX(e.clientX); });
  seek.addEventListener('pointerup', (e) => {
    if (!dragging) return; dragging = false;
    try { seek.releasePointerCapture(e.pointerId); } catch(_){}
  });
  seek.addEventListener('keydown', (e) => {
    if (!player || !player.getDuration) return;
    const dur = player.getDuration() || 0, cur = player.getCurrentTime() || 0;
    if (e.key === 'ArrowRight') player.seekTo(Math.min(dur, cur + 5), true);
    if (e.key === 'ArrowLeft')  player.seekTo(Math.max(0,   cur - 5), true);
  });

  function fmt(s){
    if (!s || isNaN(s) || !isFinite(s)) return '0:00';
    const m = Math.floor(s/60), sec = Math.floor(s%60);
    return m + ':' + String(sec).padStart(2,'0');
  }
  function paintSeek(frac, cur, dur){
    $('fill').style.width = (frac*100) + '%';
    $('star').style.left = (frac*100) + '%';
    $('cur').textContent = fmt(cur);
    $('dur').textContent = fmt(dur);
    seek.setAttribute('aria-valuemax', Math.floor(dur||0));
    seek.setAttribute('aria-valuenow', Math.floor(cur||0));
  }

  // ---------- poll loop ----------
  setInterval(() => {
    if (!player || !player.getDuration) return;
    updateTitle();
    if (dragging) return;
    const dur = player.getDuration() || 0;
    const cur = player.getCurrentTime() || 0;
    paintSeek(dur ? cur/dur : 0, cur, dur);
  }, 250);
</script>
</body>
</html>
