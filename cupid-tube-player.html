  .stage{ position:relative; width:100%; max-width:760px; margin:auto; }

  .device{ width:100%; background:var(--panel); border:3px solid var(--ink);
    box-shadow:6px 6px 0 0 rgba(0,0,0,.35), 0 0 0 3px var(--ink); padding:16px; }

  .titlebar{ display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:14px; }
  .logo{ font-family:'Press Start 2P',monospace; font-size:clamp(9px,2.4vw,13px); color:var(--ink);
    display:flex; align-items:center; gap:8px; white-space:nowrap; overflow:hidden; }

  .btn{ font-family:'Press Start 2P',monospace; background:var(--cream); color:var(--ink);
    border:3px solid var(--ink); box-shadow:3px 3px 0 0 var(--ink); cursor:pointer;
    transition:transform .04s, box-shadow .04s; user-select:none; }
  .btn:active{ transform:translate(3px,3px); box-shadow:0 0 0 0 var(--ink); }
  .btn:focus-visible{ outline:3px dashed var(--ink); outline-offset:3px; }
  .btn.accent{ background:var(--accent); color:var(--cream); }
  .btn.label{ background:var(--label); color:var(--cream); }
  .btn.on{ background:var(--accent); color:var(--cream); }

  .loadrow{ display:flex; gap:8px; margin-bottom:12px; }
  .urlinput{ flex:1; min-width:0; font-family:'VT323',monospace; font-size:20px; color:var(--ink);
    background:var(--cream); border:3px solid var(--ink); box-shadow:3px 3px 0 0 var(--ink); padding:6px 10px; }
  .urlinput:focus{ outline:none; }

  .layout{ display:grid; grid-template-columns:1fr; gap:14px; }
  @media(min-width:680px){ .layout{ grid-template-columns:minmax(0,1fr) 230px; align-items:start; } }

  .screen{ position:relative; background:#000; border:3px solid var(--ink);
    box-shadow:inset 0 0 0 3px var(--panelDark); aspect-ratio:16/9; overflow:hidden; }
  .screen #ytplayer{ width:100%; height:100%; border:0; display:block; }
  .placeholder{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    text-align:center; color:var(--panelDark); font-size:20px; padding:16px; }

  /* ---------- turntable (wavy vinyl + blue deck controls) ---------- */
  .turntable{ position:relative; width:230px; height:230px; margin:14px auto 12px;
    background:var(--panelDark); border:3px solid var(--ink); box-shadow:4px 4px 0 0 var(--ink); }

  .vinyl.spin{ animation:spin 3.4s linear infinite; }
  .vinyl .lbl{ position:absolute; inset:36%; border-radius:50%; background:var(--label); border:2px solid var(--ink);
    display:flex; align-items:center; justify-content:center; color:var(--cream);
    font-family:'Press Start 2P',monospace; font-size:10px; }
  .vinyl .hole{ position:absolute; inset:47%; border-radius:50%; background:var(--cream); border:1px solid var(--ink); }
  @keyframes spin{ from{ transform:translateX(-50%) rotate(0deg); } to{ transform:translateX(-50%) rotate(360deg); } }

  .tonebase{ position:absolute; top:8px; right:10px; width:22px; height:22px; border-radius:50%;
    background:var(--cream); border:3px solid var(--ink); z-index:3; }
  .tonearm{ position:absolute; top:17px; right:19px; width:9px; height:100px; background:var(--cream);
    border:3px solid var(--ink); transform-origin:50% 6px; transform:rotate(6deg);
    transition:transform .5s cubic-bezier(.2,1.4,.4,1); z-index:2; }
  .turntable.playing .tonearm{ transform:rotate(24deg); }
  .tonearm .head{ position:absolute; bottom:-8px; left:-5px; width:17px; height:12px;
    background:var(--accent); border:3px solid var(--ink); }

  /* blue dials + buttons for depth */
  .dial{ position:absolute; width:30px; height:30px; border-radius:50%;
    background:radial-gradient(circle at 34% 30%, var(--blueHi), var(--blue) 62%, var(--blueLo));
    border:3px solid var(--ink);
    box-shadow:2px 2px 0 var(--ink), inset -2px -2px 0 rgba(0,0,0,.35), inset 2px 2px 0 rgba(255,255,255,.28); z-index:2; }
  .dial::after{ content:""; position:absolute; left:50%; top:4px; width:3px; height:9px;
    background:var(--cream); transform:translateX(-50%); }
  .dial.d1{ left:12px; bottom:8px; }
  .dial.d2{ right:12px; bottom:8px; }
  .tbtn{ position:absolute; width:22px; height:15px; bottom:16px;
    background:linear-gradient(var(--blueHi), var(--blue) 55%, var(--blueLo));
    border:3px solid var(--ink); box-shadow:2px 2px 0 var(--ink), inset 0 2px 0 rgba(255,255,255,.3); z-index:2; }
  .tbtn.b1{ left:50%; transform:translateX(-27px); }
  .tbtn.b2{ left:50%; transform:translateX(5px); }

  .titlebox{ overflow:hidden; white-space:nowrap; background:var(--cream); border:3px solid var(--ink);
    box-shadow:3px 3px 0 0 var(--ink); padding:6px 10px; margin-bottom:12px; height:34px; display:flex; align-items:center; }
  .titlebox span{ display:inline-block; color:var(--ink); font-size:22px; line-height:1; }
  .titlebox span.marq{ animation:marquee 9s linear infinite; }
  @keyframes marquee{ 0%{transform:translateX(0);} 100%{transform:translateX(calc(-100% - 40px));} }

  /* ---------- shared slider bars (seek + volume) ---------- */
  .bar{ position:relative; height:18px; background:var(--cream); border:3px solid var(--ink);
    box-shadow:3px 3px 0 0 var(--ink); cursor:pointer; touch-action:none; }
  .bar .fill{ position:absolute; left:0; top:0; bottom:0; width:0%; background:var(--accent); }
  .bar .star{ position:absolute; top:50%; left:0%; transform:translate(-50%,-50%);
    filter:drop-shadow(2px 2px 0 var(--ink)); pointer-events:none; }
  .times{ display:flex; justify-content:space-between; color:var(--ink); font-size:18px; margin:8px 0 12px; }

  .transport{ display:flex; align-items:center; justify-content:center; gap:8px; margin-bottom:14px; }
  .transport .btn{ font-size:12px; padding:10px 10px; }
  .transport .play{ font-size:14px; padding:12px 16px; }

  .volrow{ display:flex; align-items:center; gap:10px; margin-bottom:6px; }
  .volrow span{ color:var(--ink); font-size:18px; width:28px; }
  .volrow .bar{ flex:1; }

  .status{ color:var(--ink); font-size:16px; opacity:.75; text-align:center; min-height:20px; margin-top:10px; }
  .status.err{ color:var(--accent); opacity:1; }

  .sidebar{ background:var(--cream); border:3px solid var(--ink); box-shadow:4px 4px 0 0 var(--ink);
    display:flex; flex-direction:column; max-height:520px; }
  .sidebar h2{ font-family:'Press Start 2P',monospace; font-size:10px; color:var(--cream); background:var(--accent);
    margin:0; padding:10px; border-bottom:3px solid var(--ink); }
  .queue{ overflow-y:auto; }
  .qrow{ display:flex; align-items:center; gap:8px; width:100%; text-align:left; border:none; background:transparent;
    color:var(--ink); border-bottom:2px solid rgba(0,0,0,.12); padding:8px 10px;
    font-family:'VT323',monospace; font-size:19px; cursor:pointer; }
  .qrow:hover{ background:var(--panelDark); }
  .qrow.current{ background:var(--accentSoft); color:var(--cream); }
  .qrow.played{ opacity:.55; }
  .qrow .num{ width:22px; flex-shrink:0; text-align:center; }
  .qrow .name{ white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .queue-empty{ padding:12px; color:var(--ink); opacity:.7; font-size:18px; }

  /* ---------- framing petals (keyed StockCake art) ---------- */
  .petals{ position:absolute; top:40px; width:152px; z-index:5; pointer-events:none;
    filter:drop-shadow(1px 2px 1px rgba(90,50,110,.55)); }
  .petals.left{ left:-140px; }
  .petals.right{ right:-140px; transform:scaleX(-1); }
  .petals img{ display:block; width:100%; height:auto; animation:petalfloat 6s ease-in-out infinite; }
  @keyframes petalfloat{ 0%,100%{ transform:translateY(0) rotate(0deg); } 50%{ transform:translateY(12px) rotate(1.5deg); } }
  @media(max-width:1100px){ .petals{ display:none; } }

  @media (prefers-reduced-motion: reduce){
    .vinyl.spin,.titlebox span.marq,.petals img{ animation:none !important; }
  }
</style>
</head>
<body>
  <div class="scene" aria-hidden="true"></div>

  <div class="stage">
    <div class="device" id="device" data-theme="pink">
      <div class="titlebar">
        <div class="logo">&#9829; ZombieSparkles Tube &#9829;</div>
        <button class="btn accent" id="themeBtn" style="font-size:8px;padding:7px 8px;" aria-label="Switch theme">PINK</button>
      </div>

      <div class="loadrow">
        <input class="urlinput" id="urlInput" type="text" placeholder="paste a youtube link&#8230;" aria-label="YouTube link" />
        <button class="btn label" id="loadBtn" style="font-size:10px;padding:0 12px;">LOAD</button>
      </div>

      <div class="layout">
        <div class="main">
          <div class="screen">
            <div id="ytplayer"></div>
            <div class="placeholder" id="placeholder">paste a youtube video or playlist link above, then hit LOAD &#9829;</div>
          </div>

          <div class="turntable" id="turntable">
            <div class="vinyl" id="vinyl"><div class="lbl">&#9829;</div><div class="hole"></div></div>
            <div class="tonebase"></div>
            <div class="tonearm"><div class="head"></div></div>
            <div class="dial d1"></div>
            <div class="dial d2"></div>
            <div class="tbtn b1"></div>
            <div class="tbtn b2"></div>
          </div>

          <div class="titlebox"><span id="title">&#8212; nothing playing &#8212;</span></div>

          <div class="bar" id="seek" role="slider" tabindex="0" aria-label="Seek" aria-valuemin="0" aria-valuemax="0" aria-valuenow="0">
            <div class="fill" id="fill"></div>
            <div class="star" id="star" aria-hidden="true"><svg width="30" height="30" viewBox="0 0 24 24"><defs><linearGradient id="pstar1" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#e6ccff"/><stop offset="0.5" stop-color="#b98cff"/><stop offset="1" stop-color="#7a4fd0"/></linearGradient></defs><path d="M12 2 L15 9 L22 9 L16.5 13.5 L18.5 21 L12 16.5 L5.5 21 L7.5 13.5 L2 9 L9 9 Z" fill="url(#pstar1)" stroke="var(--ink)" stroke-width="1.4" stroke-linejoin="round"/></svg></div>
          </div>
          <div class="times"><span id="cur">0:00</span><span id="dur">0:00</span></div>

          <div class="transport">
            <button class="btn" id="shuffleBtn" aria-label="Shuffle" title="Shuffle">&#8644;</button>
            <button class="btn" id="prevBtn" aria-label="Previous">&#9668;&#9668;</button>
            <button class="btn accent play" id="playBtn" aria-label="Play">&#9658;</button>
            <button class="btn" id="nextBtn" aria-label="Next">&#9658;&#9658;</button>
            <button class="btn" id="repeatBtn" aria-label="Repeat" title="Repeat">&#10227;</button>
          </div>

          <div class="volrow">
            <span>VOL</span>
            <div class="bar" id="volbar" role="slider" tabindex="0" aria-label="Volume" aria-valuemin="0" aria-valuemax="100" aria-valuenow="80">
              <div class="fill" id="volfill"></div>
              <div class="star" id="volstar" aria-hidden="true"><svg width="30" height="30" viewBox="0 0 24 24"><defs><linearGradient id="pstar2" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#e6ccff"/><stop offset="0.5" stop-color="#b98cff"/><stop offset="1" stop-color="#7a4fd0"/></linearGradient></defs><path d="M12 2 L15 9 L22 9 L16.5 13.5 L18.5 21 L12 16.5 L5.5 21 L7.5 13.5 L2 9 L9 9 Z" fill="url(#pstar2)" stroke="var(--ink)" stroke-width="1.4" stroke-linejoin="round"/></svg></div>
            </div>
          </div>

          <div class="status" id="status">plays via youtube &#183; video or playlist links both work</div>
        </div>

        <aside class="sidebar">
          <h2>UP NEXT</h2>
          <div class="queue" id="queue">
            <div class="queue-empty">load a playlist to see what's coming up &#9829;</div>
          </div>
        </aside>

<script>
  const $ = (id) => document.getElementById(id);
  const device = $('device');
  let theme = 'pink';
  $('themeBtn').addEventListener('click', () => {
    theme = theme === 'pink' ? 'blue' : 'pink';
    device.setAttribute('data-theme', theme);
    $('themeBtn').textContent = theme.toUpperCase();
  });

  let player = null, apiReady = false, pendingInput = null, dragging = false, lastTitle = '';
  let shuffleOn = false, repeatMode = 0, volLevel = 0.8;
  const REPEAT_LABEL = ['\u21bb', '\u21bb', '\u21bb\u00b9'];
  const titleCache = {};

  (function(){
    const tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(tag);
  })();

  window.onYouTubeIframeAPIReady = function(){
    const onWeb = location.protocol === 'http:' || location.protocol === 'https:';
    const vars = { controls: 0, modestbranding: 1, rel: 0, playsinline: 1, iv_load_policy: 3 };
    if (onWeb) vars.origin = location.origin;
    player = new YT.Player('ytplayer', {
      width: '100%', height: '100%',
      host: 'https://www.youtube-nocookie.com',
      playerVars: vars,
      events: {
        onReady: () => {
          apiReady = true;
          player.setVolume(Math.round(volLevel*100));
          if (pendingInput) { loadInput(pendingInput); pendingInput = null; }
        },
        onStateChange: onState,
        onError: onError
      }
    });
  };

  function parseYouTube(input){
    input = (input || '').trim();
    let video = null, list = null;
    try {
      const u = new URL(input);
      if (u.hostname.includes('youtu.be')) video = u.pathname.slice(1) || null;
      const v = u.searchParams.get('v'); if (v) video = v;
      list = u.searchParams.get('list');
      const m = u.pathname.match(/\/(embed|shorts|v)\/([^/?#]+)/);
      if (m) video = m[2];
    } catch(e){
      if (/^(PL|UU|OL|RD|LL|FL)/.test(input)) list = input;
      else if (input) video = input;
    }
    return { video, list };
  }

  function loadInput(input){
    const p = parseYouTube(input);
    if (!p.video && !p.list){ setStatus('couldn\u2019t read that link \u2014 paste a youtube video or playlist url', true); return; }
    $('placeholder').style.display = 'none';
    setStatus('loading\u2026');
    if (p.list){ player.loadPlaylist({ list: p.list, listType: 'playlist', index: 0, startSeconds: 0 }); }
    else { player.loadVideoById(p.video); }
    setTimeout(() => { applyShuffle(); applyRepeat(); renderQueue(); }, 900);
  }

  function submit(){
    const val = $('urlInput').value;
    if (!val.trim()) return;
    if (!apiReady){ pendingInput = val; setStatus('warming up the player\u2026'); return; }
    loadInput(val);
  }
  $('loadBtn').addEventListener('click', submit);
  $('urlInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') submit(); });

  $('playBtn').addEventListener('click', () => {
    if (!player || !player.getPlayerState) return;
    const st = player.getPlayerState();
    if (st === 1) player.pauseVideo(); else player.playVideo();
  });
  $('nextBtn').addEventListener('click', () => player && player.nextVideo && player.nextVideo());
  $('prevBtn').addEventListener('click', () => {
    if (!player) return;
    if (player.getCurrentTime && player.getCurrentTime() > 3){ player.seekTo(0, true); return; }
    player.previousVideo && player.previousVideo();
  });

  $('shuffleBtn').addEventListener('click', () => {
    shuffleOn = !shuffleOn;
    $('shuffleBtn').classList.toggle('on', shuffleOn);
    applyShuffle();
    setTimeout(renderQueue, 300);
  });
  function applyShuffle(){ if (player && player.setShuffle){ try { player.setShuffle(shuffleOn); } catch(_){} } }
  $('repeatBtn').addEventListener('click', () => {
    repeatMode = (repeatMode + 1) % 3;
    const btn = $('repeatBtn');
    btn.textContent = REPEAT_LABEL[repeatMode];
    btn.classList.toggle('on', repeatMode !== 0);
    applyRepeat();
  });
  function applyRepeat(){ if (player && player.setLoop){ try { player.setLoop(repeatMode === 1); } catch(_){} } }

  function onState(e){
    const playing = e.data === 1;
    $('vinyl').classList.toggle('spin', playing);
    $('turntable').classList.toggle('playing', playing);
    $('playBtn').textContent = playing ? '\u275a\u275a' : '\u25ba';
    if (e.data === 1 || e.data === 5) setStatus('');
    if (e.data === 0 && repeatMode === 2 && player){
      const idx = player.getPlaylistIndex ? player.getPlaylistIndex() : -1;
      if (idx >= 0 && player.playVideoAt) player.playVideoAt(idx);
      else { player.seekTo(0, true); player.playVideo(); }
    }
    updateTitle();
    renderQueue();
  }

  function onError(e){
    const map = {
      2:'that link looks malformed',
      5:'this video can\u2019t play in an embedded player',
      100:'video not found \u2014 it may be private or removed',
      101:'the owner disabled embedding for this one',
      150:'the owner disabled embedding for this one',
      153:'the page didn\u2019t send a referrer \u2014 serve this over http(s), not file://'
    };
    setStatus(map[e.data] || ('youtube error ' + e.data), true);
  }

  function setStatus(msg, isErr){ const s = $('status'); s.textContent = msg; s.classList.toggle('err', !!isErr); }

  function updateTitle(){
    if (!player || !player.getVideoData) return;
    const d = player.getVideoData();
    const title = (d && d.title) ? d.title : '';
    if (d && d.video_id && title) titleCache[d.video_id] = title;
    if (title && title !== lastTitle){
      lastTitle = title;
      const span = $('title');
      span.textContent = title;
      span.classList.remove('marq');
      const box = span.parentElement;
      if (span.scrollWidth > box.clientWidth + 4) span.classList.add('marq');
    }
  }

  function renderQueue(){
    const wrap = $('queue');
    if (!player || !player.getPlaylist) return;
    const ids = player.getPlaylist() || [];
    const idx = player.getPlaylistIndex ? player.getPlaylistIndex() : -1;
    if (!ids.length){
      const d = player.getVideoData ? player.getVideoData() : null;
      if (d && d.title){ wrap.innerHTML = ''; wrap.appendChild(makeRow(0, d.title, true, false)); }
      return;
    }
    wrap.innerHTML = '';
    ids.forEach((id, i) => {
      const name = titleCache[id] || ('Track ' + (i + 1));
      const row = makeRow(i, name, i === idx, i < idx);
      row.addEventListener('click', () => { if (player.playVideoAt) player.playVideoAt(i); });
      wrap.appendChild(row);
    });
    const cur = wrap.querySelector('.qrow.current');
    if (cur && cur.scrollIntoView) cur.scrollIntoView({ block: 'nearest' });
  }

  function makeRow(i, name, isCurrent, isPlayed){
    const row = document.createElement('button');
    row.className = 'qrow' + (isCurrent ? ' current' : '') + (isPlayed ? ' played' : '');
    const num = document.createElement('span'); num.className = 'num'; num.textContent = isCurrent ? '\u266a' : (i + 1);
    const nm = document.createElement('span'); nm.className = 'name'; nm.textContent = name;
    row.appendChild(num); row.appendChild(nm);
    return row;
  }

  /* ---------- seek bar ---------- */
  const seek = $('seek');
  function seekFromClientX(clientX){
    if (!player || !player.getDuration) return;
    const dur = player.getDuration() || 0;
    if (!dur) return;
    const rect = seek.getBoundingClientRect();
    const frac = Math.min(1, Math.max(0, (clientX - rect.left) / rect.width));
    player.seekTo(frac * dur, true);
    paintSeek(frac, frac * dur, dur);
  }
  seek.addEventListener('pointerdown', (e) => {
    if (!player || !player.getDuration || !player.getDuration()) return;
    seek.setPointerCapture(e.pointerId); dragging = true; seekFromClientX(e.clientX);
  });
  seek.addEventListener('pointermove', (e) => { if (dragging) seekFromClientX(e.clientX); });
  seek.addEventListener('pointerup', (e) => {
    if (!dragging) return; dragging = false;
    try { seek.releasePointerCapture(e.pointerId); } catch(_){}
  });
  seek.addEventListener('keydown', (e) => {
    if (!player || !player.getDuration) return;
    const dur = player.getDuration() || 0, cur = player.getCurrentTime() || 0;
    if (e.key === 'ArrowRight') player.seekTo(Math.min(dur, cur + 5), true);
    if (e.key === 'ArrowLeft')  player.seekTo(Math.max(0,   cur - 5), true);
  });

  function fmt(s){
    if (!s || isNaN(s) || !isFinite(s)) return '0:00';
    const m = Math.floor(s/60), sec = Math.floor(s%60);
    return m + ':' + String(sec).padStart(2,'0');
  }
  function paintSeek(frac, cur, dur){
    $('fill').style.width = (frac*100) + '%';
    $('star').style.left = (frac*100) + '%';
    $('cur').textContent = fmt(cur);
    $('dur').textContent = fmt(dur);
    seek.setAttribute('aria-valuemax', Math.floor(dur||0));
    seek.setAttribute('aria-valuenow', Math.floor(cur||0));
  }

  /* ---------- volume bar (matches seek) ---------- */
  const volbar = $('volbar');
  let vdrag = false;
  function paintVol(frac){
    $('volfill').style.width = (frac*100) + '%';
    $('volstar').style.left = (frac*100) + '%';
    volbar.setAttribute('aria-valuenow', Math.round(frac*100));
  }
  function volFromClientX(clientX){
    const rect = volbar.getBoundingClientRect();
    const frac = Math.min(1, Math.max(0, (clientX - rect.left) / rect.width));
    volLevel = frac;
    if (player && player.setVolume) player.setVolume(Math.round(frac*100));
    paintVol(frac);
  }
  volbar.addEventListener('pointerdown', (e) => { volbar.setPointerCapture(e.pointerId); vdrag = true; volFromClientX(e.clientX); });
  volbar.addEventListener('pointermove', (e) => { if (vdrag) volFromClientX(e.clientX); });
  volbar.addEventListener('pointerup', (e) => { vdrag = false; try { volbar.releasePointerCapture(e.pointerId); } catch(_){} });
  volbar.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight') volFromClientX(volbar.getBoundingClientRect().left + volbar.getBoundingClientRect().width*Math.min(1,volLevel+0.05));
    if (e.key === 'ArrowLeft')  volFromClientX(volbar.getBoundingClientRect().left + volbar.getBoundingClientRect().width*Math.max(0,volLevel-0.05));
  });
  paintVol(volLevel);

  setInterval(() => {
    if (!player || !player.getDuration) return;
    updateTitle();
    if (dragging) return;
    const dur = player.getDuration() || 0;
    const cur = player.getCurrentTime() || 0;
    paintSeek(dur ? cur/dur : 0, cur, dur);
  }, 250);
</script>
</body>
</html>
